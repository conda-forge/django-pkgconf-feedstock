{% set name = "django-pkgconf" %}
{% set version = "0.5.0" %}
{% set sha256 = "f108550a18cf434a3f6b3ec10b6da5748eac0882c51ef7108f2b20621b918ed9" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  fn: {{ name }}-{{ version }}.tar.gz
  url: https://github.com/byashimov/{{ name }}/archive/{{ version }}.tar.gz
  sha256: {{ sha256 }}

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} -m pip install . --no-deps -vv

requirements:
  build:
    - python
    - setuptools
    - pip
  run:
    - python
    - django

test:
  imports:
    - pkgconf

about:
  home: https://github.com/byashimov/django-pkgconf
  license: BSD-3-Clause
  license_family: BSD
  license_file: LICENSE
  summary: 'Yet another application settings helper'
  description: Yet another application settings helper
  doc_url: https://github.com/byashimov/django-pkgconf
  dev_url: https://github.com/byashimov/django-pkgconf

extra:
  recipe-maintainers:
    - cshaley
    - sannykr
